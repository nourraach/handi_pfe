services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: handitalents
    ports:
      - "5433:5432"
    volumes:
      - microservices_pgdata:/var/lib/postgresql/data

  core-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      PORT: 5000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./handi_talents-main_abir:/app
    depends_on:
      - postgres

  auth-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4101
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4101:4101"
    volumes:
      - ./microservices/auth-service:/app
    depends_on:
      - postgres

  user-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4102
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4102:4102"
    volumes:
      - ./microservices/user-service:/app
    depends_on:
      - postgres

  job-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4103
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4103:4103"
    volumes:
      - ./microservices/job-service:/app
    depends_on:
      - postgres

  application-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4104
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4104:4104"
    volumes:
      - ./microservices/application-service:/app
    depends_on:
      - postgres

  interview-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4105
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4105:4105"
    volumes:
      - ./microservices/interview-service:/app
    depends_on:
      - postgres

  reporting-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4106
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4106:4106"
    volumes:
      - ./microservices/reporting-service:/app
    depends_on:
      - postgres

  notification-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      PORT: 4107
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/handitalents
      JWT_SECRET: votre_secret_jwt
      JWT_EXPIRES_IN: 1d
    ports:
      - "4107:4107"
    volumes:
      - ./microservices/notification-service:/app
    depends_on:
      - postgres

  api-gateway:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      AUTH_SERVICE_ENABLED: "true"
      AUTH_SERVICE_URL: http://auth-service:4101
      USER_SERVICE_ENABLED: "true"
      USER_SERVICE_URL: http://user-service:4102
      JOB_SERVICE_ENABLED: "true"
      JOB_SERVICE_URL: http://job-service:4103
      APPLICATION_SERVICE_ENABLED: "true"
      APPLICATION_SERVICE_URL: http://application-service:4104
      INTERVIEW_SERVICE_ENABLED: "true"
      INTERVIEW_SERVICE_URL: http://interview-service:4105
      REPORTING_SERVICE_ENABLED: "true"
      REPORTING_SERVICE_URL: http://reporting-service:4106
      NOTIFICATION_SERVICE_ENABLED: "true"
      NOTIFICATION_SERVICE_URL: http://notification-service:4107
      CORE_SERVICE_URL: http://core-service:5000
    ports:
      - "4000:4000"
    volumes:
      - ./microservices/api-gateway:/app
    depends_on:
      - core-service
      - auth-service
      - user-service
      - job-service
      - application-service
      - interview-service
      - reporting-service
      - notification-service

volumes:
  microservices_pgdata:
